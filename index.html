<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-a-Sketch</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/script.js" defer></script>
    <link rel="shortcut icon" href="./img/Untitled.png" type="image/x-icon">
</head>
<body>
    <header class="header">
        <h1>Etch-a-Sketch</h1>
    </header>

    <section class="container">
        <div class="border-grid">
            <div class="grid" id="blocksGrid"></div>
        </div>
        <div class="container-attributes">
            <div class="attributes">
                <label class="name" id="resolution">Resolution: </label>
                <input type="range" class="range" min="2" max="64" id="range" value="16">
            </div>
            <div class="attributes">
                <button class="button" onclick="randomColor()">Random Color</button>
            </div>
            <div class="attributes">
                <label class="name">Color</label>
                <input type="color" id="inputcolor">
            </div>
            <div class="attributes">
                <button class="button" id="clear" onclick="buttonClear()">Clear</button>
            </div>
        </div>
    </section>
</body>
</html>
